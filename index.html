function fmt(d){var dt=new Date(d+"T00:00:00");return(dt.getMonth()+1)+"/"+dt.getDate();}
function daysSince(d){return Math.floor((new Date()-new Date(d+"T00:00:00"))/86400000);}
function weekOf(d){var dt=new Date(d+"T00:00:00");var day=dt.getDay();var diff=dt.getDate()-day+(day===0?-6:1);return new Date(dt.setDate(diff)).toISOString().split("T")[0];}
