const fmt = d => { const dt=new Date(d+"T00:00:00"); return `${dt.getMonth()+1}/${dt.getDate()}`; };
const daysSince = d => Math.floor((new Date()-new Date(d+"T00:00:00"))/86400000);
const weekOf = d => { const dt=new Date(d+"T00:00:00"); const day=dt.getDay(); const diff=dt.getDate()-day+(day===0?-6:1); return new Date(dt.setDate(diff)).toISOString().split("T")[0]; };

function Tabs({tabs,active,onChange}) {
  return React.createElement("div", {style:{display:"flex",gap:0,overflowX:"auto",WebkitOverflowScrolling:"touch",borderBottom:`1.5px solid ${T.border}`}},
    tabs.map(t => React.createElement("button", {key:t.key, onClick:()=>onChange(t.key), style:{
      padding:"11px 13px",border:"none",background:active===t.key?T.accent:"transparent",
      color:active===t.key?"#fff":T.textMuted,fontWeight:active===t.key?700:500,
      fontSize:13,cursor:"pointer",borderRadius:active===t.key?"8px 8px 0 0":0,
      transition:"all 0.2s",whiteSpace:"nowrap",fontFamily:"'Noto Sans TC',sans-serif",
    }}, t.icon+" "+t.label))
  );
}

}

}

          if(BM[lr.brunnUpper]>BM[fr.brunnUpper])ch.push("上肢分期↑");if(BM[lr.brunnFinger]>BM[fr.brunnFinger])ch.push("手指分期↑");
          if(BM[lr.brunnLower]>BM[fr.brunnLower])ch.push("下肢分期↑");if(GM[lr.gripStrength]>GM[fr.gripStrength])ch.push("握力↑");
          if(AM[lr.ankleDorsi]>AM[fr.ankleDorsi])ch.push("踝背屈↑");
          return React.createElement("div",{key:w.week,style:{background:T.card,borderRadius:14,padding:"16px",boxShadow:T.shadow,marginBottom:14}},
            React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
              React.createElement("h3",{style:{margin:0,fontSize:15,fontWeight:700,fontFamily:"'Noto Serif TC',serif"}},w.label),
              React.createElement("span",{style:{fontSize:11,color:T.textMuted}},w.days+" 天紀錄")
            ),
            React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}},
              tag(`平均疼痛 ${w.avgPain}`, ap<=3?"#EEF5F1":ap<=6?"#FDF6F0":"#FCEEED", ap<=3?T.green:ap<=6?T.yellow:T.red),
              tag(`上肢${lr.brunnUpper} · 下肢${lr.brunnLower}`,"#EEF5F1",T.accent)
            ),
            ch.length>0 && React.createElement("div",{style:{fontSize:12,marginBottom:6,color:T.green,fontWeight:600}},"▲ "+ch.join("、")),
            React.createElement("div",{style:{fontSize:11,color:T.textMuted}},`週末狀態：${lr.walking} · 站立${lr.standing} · 握力${lr.gripStrength}`),
            React.createElement("div",{style:{marginTop:8}},React.createElement(ResponsiveContainer,{width:"100%",height:50},React.createElement(LineChart,{data:w.records.map(r=>({d:fmt(r.date),p:r.painScore}))},React.createElement(Line,{type:"monotone",dataKey:"p",stroke:T.red,strokeWidth:1.5,dot:{r:2,fill:T.red}}),React.createElement(XAxis,{dataKey:"d",hide:true}),React.createElement(YAxis,{domain:[0,10],hide:true}))))
          );
        })
      )
    ),

    // Toast
    toast && React.createElement("div",{style:{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.accent,color:"#fff",padding:"10px 22px",borderRadius:24,fontSize:13,fontWeight:600,boxShadow:"0 4px 16px rgba(0,0,0,0.12)",animation:"fadeUp 0.3s"}},toast)
  );
}
